<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arpit | JS</title>
</head>
<body style="background-color:rgb(14, 21, 1); color: white">
    <ul class="language">
        <li>JavaScript</li>
    </ul>    
</body>
<script>
    function addLanguage(langName){
        const li = document.createElement('li');
        li.innerHTML = `${langName}`
        document.querySelector(".language").appendChild(li) //Problem in this is that it has optimization problem bcz it transverse through whole tree, which isn't a good practice.
    }
    addLanguage('CPP');
    addLanguage('Python');

    function addOptiLanguage(langName){
        const li = document.createElement('li');
        li.appendChild(document.createTextNode(langName));
        document.querySelector('.language').appendChild(li);
    }
    addOptiLanguage("Java");
    addOptiLanguage("Rust");

    //EDIT
    const secondLang = document.querySelector("li:nth-child(2)");
    //secondLang.innerHTML = "Mojo" (again it's less optimized)
    const newLi = document.createElement('li');
    newLi.textContent = "Mojo";
    secondLang.replaceWith(newLi);

    //EDIT
    const firstLang = document.querySelector("li:first-child");
    firstLang.outerHTML = '<li>TypeScript</li>';

    //REMOVE
    const lastLang = document.querySelector("li:last-child")
    lastLang.remove();    
</script>
</html>
